name: build

# Builds vr-sandbox + vr-vpn images on native runners per arch (no
# QEMU emulation), smoke-tests each arch on its own runner, then
# merges the per-arch digests into a single multi-arch manifest.
#
# Why split: building linux/amd64+linux/arm64 in one buildx step on
# ubuntu-latest takes >6h because the arm64 portion runs under QEMU.
# GitHub now offers free ubuntu-24.04-arm runners for public repos,
# so each arch builds in ~30 min natively and they run in parallel.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  SANDBOX_IMAGE: nnamon/vr-sandbox
  VPN_IMAGE: nnamon/vr-vpn

jobs:
  # One matrix arm per (image, architecture). Each runs on a NATIVE
  # runner so the build is CPU-bound, not QEMU-bound. vr-vpn is the
  # thin alpine+openvpn sidecar; tiny enough (~12 MB) that the extra
  # build time is negligible alongside vr-sandbox.
  #
  # Tag pushes (refs/tags/v*) SKIP the build matrix entirely and go
  # straight to the `retag` job below — the matching :<sha> manifest
  # was already published by the main-branch build for that commit,
  # so the tag just needs a manifest-list copy on Docker Hub
  # (~10 seconds vs ~1.5h for a fresh multi-arch build).
  build:
    if: github.ref_type != 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: sandbox
            dockerfile: Dockerfile
            image_ref: nnamon/vr-sandbox
            local_tag: vr-sandbox
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - image: sandbox
            dockerfile: Dockerfile
            image_ref: nnamon/vr-sandbox
            local_tag: vr-sandbox
            arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - image: vpn
            dockerfile: Dockerfile.vpn
            image_ref: nnamon/vr-vpn
            local_tag: vr-vpn
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - image: vpn
            dockerfile: Dockerfile.vpn
            image_ref: nnamon/vr-vpn
            local_tag: vr-vpn
            arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Free ~40 GB on the runner. Image growth (multi-glibc, zig,
      # gh, ld.lld, cpio, expanded wordlists) pushed past the
      # previous ~30 GB headroom; `load: true` in the build step
      # needs disk for the full uncompressed image plus build cache.
      # The three flags newly flipped to true reclaim:
      #   large-packages — azure-cli, gcloud-sdk, mongodb, mysql-server,
      #                    powershell etc. (~6 GB). Slow step (~3 min)
      #                    but the image takes far longer to build, so
      #                    net build time barely changes.
      #   docker-images  — preinstalled docker images we don't use
      #                    since we build our own from scratch (~5 GB).
      #   swap-storage   — the runner's 4 GB swapfile. Build is
      #                    memory-light (a single arch, no parallel
      #                    arches under qemu) so swap loss is fine.
      # Keeps apt repos working and the docker daemon intact.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # Free additional disk that jlumbroso/free-disk-space doesn't
      # touch. The `load: true` step's docker-import needs roughly 3×
      # the image size (buildkit cache + tarball + overlay unpack).
      - name: Free more disk (toolchains free-disk-space misses)
        run: |
          set -e
          echo "── disk before extra cleanup ──"
          df -h /
          sudo rm -rf /usr/lib/jvm                || true
          sudo rm -rf /usr/local/.ghcup           || true
          sudo rm -rf /usr/local/lib/android      || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/share/dotnet           || true
          sudo rm -rf /usr/share/swift            || true
          sudo rm -rf /opt/microsoft              || true
          [ -n "${AGENT_TOOLSDIRECTORY:-}" ] && sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          echo "── disk after extra cleanup ──"
          df -h /

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build + push direct to the registry (no local materialization).
      # Previously used `load: true` which exports a tarball + imports
      # it into the local docker daemon's data-root for smoke testing.
      # That triple-footprint (buildkit cache + tarball + unpacked
      # overlay) consistently overran the runner's ~54 GB of free disk
      # by the LLVM/sagemath import step. Pushing direct skips both
      # the export and the docker-daemon import — the image goes
      # buildkit → registry. Smoke testing then pulls by digest below.
      #
      # On PR builds (no docker-hub creds), we use cacheonly to validate
      # the build completes without pushing or smoke-testing.
      - name: Build (${{ matrix.image }}/${{ matrix.arch }}, native)
        id: build
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', matrix.image_ref) || 'type=cacheonly' }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      # Single retry on transient registry errors. Docker Hub
      # occasionally returns 504 mid-push; the first build's buildkit
      # cache + cache-from=gha makes the rebuild a near-instant
      # cache-replay so we just push again. Only fires when the first
      # attempt failed (steps.build.outcome=='failure') AND we're in
      # a push event.
      - name: Build retry (${{ matrix.image }}/${{ matrix.arch }})
        id: build_retry
        if: |
          steps.build.outcome == 'failure'
          && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ matrix.image_ref }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      - name: Build verdict
        if: |
          steps.build.outcome == 'failure'
          && (steps.build_retry.outcome == '' || steps.build_retry.outcome == 'failure')
          && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          echo "::error::build failed twice for ${{ matrix.image }}/${{ matrix.arch }}"
          exit 1

      # Reclaim the ~14 GB buildkit cache before pulling the image
      # back for smoke. Without this, buildkit's storage + the
      # incoming pull both compete for the same partition.
      - name: Reclaim buildkit cache
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker buildx prune -af 2>&1 | tail -3
          docker image prune -af 2>&1 | tail -3
          df -h /

      - name: Pull image for smoke test (${{ matrix.image }}/${{ matrix.arch }})
        id: pull
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          DIGEST="${{ steps.build_retry.outputs.digest || steps.build.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "::error::no build digest available — both attempts failed?"
            exit 1
          fi
          echo "DIGEST=$DIGEST" >> "$GITHUB_OUTPUT"
          docker pull "${{ matrix.image_ref }}@${DIGEST}"
          docker tag "${{ matrix.image_ref }}@${DIGEST}" "${{ matrix.local_tag }}:latest"

      - name: Smoke test (${{ matrix.image }}/${{ matrix.arch }})
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ matrix.image }}" = "sandbox" ]; then
            ./build.sh --no-build
          else
            # vr-vpn sidecar: confirm openvpn binary present + reports
            # a version. Anything beyond a help-string check would need
            # NET_ADMIN cap which we can't reasonably grant in CI.
            docker run --rm ${{ matrix.local_tag }}:latest openvpn --version | head -1
          fi

      - name: Export digest
        id: digest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build_retry.outputs.digest || steps.build.outputs.digest }}"
          echo "${{ matrix.arch }}=${digest}" >> "$GITHUB_OUTPUT"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  # Merge per-arch digests into one multi-arch manifest per image.
  # Each image gets :latest and :<sha> tags. Cheap (no rebuild) —
  # composes manifest lists from already-pushed by-digest images.
  merge:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: sandbox
            image_ref: nnamon/vr-sandbox
            artifact_prefix: digest-sandbox-
          - image: vpn
            image_ref: nnamon/vr-vpn
            artifact_prefix: digest-vpn-
    steps:
      - name: Download digests for ${{ matrix.image }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: ${{ matrix.artifact_prefix }}*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push (${{ matrix.image }})
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.image_ref }}:latest \
            -t ${{ matrix.image_ref }}:${{ github.sha }} \
            $(printf '${{ matrix.image_ref }}@sha256:%s ' *)

      - name: Inspect resulting image (${{ matrix.image }})
        run: docker buildx imagetools inspect ${{ matrix.image_ref }}:latest

  # Retag-only path for tag pushes — no rebuild. Composes a fresh
  # manifest list pointing at the same per-arch digests that
  # nnamon/<image>:<sha> already references, then publishes it under
  # the tag name. Takes ~10s instead of the ~1.5h a fresh multi-arch
  # build needs.
  #
  # Assumption: the tagged commit was already built on main (or via
  # workflow_dispatch) before the tag was pushed. If :<sha> doesn't
  # exist yet on Docker Hub, this poll-loops for up to 15min waiting
  # for the build to publish — covers the "git push main && git push
  # --tags" case where both events fire near-simultaneously.
  retag:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image_ref: [nnamon/vr-sandbox, nnamon/vr-vpn]
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Wait for ${{ matrix.image_ref }}:${{ github.sha }} to be published
        run: |
          # The main-branch build for this commit may still be in flight
          # if main + tag were pushed together. Poll for up to 15min.
          SRC="${{ matrix.image_ref }}:${{ github.sha }}"
          for i in $(seq 1 90); do
            if docker buildx imagetools inspect "$SRC" >/dev/null 2>&1; then
              echo "found $SRC after ${i}x10s"
              exit 0
            fi
            echo "  waiting for $SRC (attempt $i/90)..."
            sleep 10
          done
          echo "ERROR: $SRC never appeared. Push tag again after main build completes."
          exit 1

      - name: Retag as :${{ github.ref_name }}
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.image_ref }}:${{ github.ref_name }} \
            ${{ matrix.image_ref }}:${{ github.sha }}

      - name: Inspect resulting tag
        run: docker buildx imagetools inspect ${{ matrix.image_ref }}:${{ github.ref_name }}
